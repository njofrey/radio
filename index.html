<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Radio Nico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#F8F5F2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Radio Nico</h1>
    <p>Streaming en vivo.</p>
  </header>

  <main>
    <div class="player single">
      <div class="now-playing">
        <p>Ahora suena</p>
        <h2 id="song-title">Cargando</h2>
        <h3 id="artist-name"></h3>
        <p id="last-updated" class="meta-small"></p>
      </div>

      <div class="player-controls">
        <button id="play-btn" type="button" aria-label="Reproducir">▶️</button>
        <button id="pause-btn" type="button" aria-label="Pausar" disabled>⏸️</button>
        <span id="status-badge" class="status-badge status-idle">Listo</span>
      </div>

      <!-- data attrs inyectan config sin editar JS en despliegues simples -->
      <audio id="audio-player" crossorigin="anonymous"
             data-station-name="Radio Nico"
             data-stream-url="__REPLACE_STREAM_URL__"
             data-metadata-url="__REPLACE_METADATA_URL__"
             data-metadata-type="icecast"></audio>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Radio Nico. Proyecto en construcción.</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
