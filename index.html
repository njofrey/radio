<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Radio Matías Batista - Al Aire</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<body>

    <header>
        <h1>Radio Matías Batista</h1>

                <p>Ahora Suena:</p>
                <h2 id="song-title">Cargando...</h2>

            <audio id="audio-player" controls></audio>

        <div class="info-section">
            <h2>Nuestra Programación</h2>
            <p>Próximamente aquí...</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Radio Matías Batista. Un proyecto con pasión.</p>
    </footer>

    <script src="script.js"></script>

</html>
