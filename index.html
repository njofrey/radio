<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF--8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Radio Online - ¡Al Aire!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>📻 Mi Radio Online</h1>
        <p>La música que te mueve.</p>
    </header>

    <main>
        <div class="player">
            <div class="now-playing">
                <p>Ahora Suena:</p>
                <div id="cover-art">
                    <img src="https://via.placeholder.com/150" alt="Carátula del Álbum">
                </div>
                <h2 id="song-title">Cargando...</h2>
                <h3 id="artist-name"></h3>
            </div>
            
            <audio id="audio-player" controls src="URL_DE_TU_STREAM_AQUI"></audio>
            </div>

        <div class="info-section">
            <h2>Nuestra Programación</h2>
            <p>Próximamente aquí...</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Mi Radio Online. Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
