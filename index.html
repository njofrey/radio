<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Radio Matías Batista · Al Aire</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#F8F5F2">

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Radio Matías Batista</h1>
    <p>La música que te mueve</p>
  </header>

  <main>
    <section class="player" aria-label="Reproductor de radio">
      <div class="now-playing">
        <p class="np-label">Ahora suena</p>
        <h2 id="song-title">En vivo</h2>
        <h3 id="artist-name">Radio Matías Batista</h3>
        <p id="last-updated" class="meta-small"></p>
      </div>

      <!-- Controles nativos para máxima compatibilidad -->
      <audio
        id="audio-player"
        preload="none"
        controls
        controlslist="nodownload noplaybackrate"
        playsinline
        crossorigin="anonymous">
        Tu navegador no soporta audio HTML5.
      </audio>
    </section>

    <section class="info-section">
      <h2>Programación</h2>
      <p>Pronto.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Radio Matías Batista. Proyecto independiente.</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
