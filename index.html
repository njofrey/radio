<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Radio Matías Batista · Al Aire</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#F8F5F2">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <h1>📻 Radio Matías Batista</h1>
    <p>La música que te mueve</p>
  </header>

  <main>
    <section class="player" aria-label="Reproductor de radio">
      <div class="now-playing">
        <p class="np-label">Ahora suena</p>
        <h2 id="song-title">En vivo</h2>
        <h3 id="artist-name">Radio Matías Batista</h3>
        <p id="last-updated" class="meta-small"></p>
      </div>

      <div class="player-controls">
        <button id="play-btn" type="button" aria-label="Reproducir">▶️</button>
        <button id="pause-btn" type="button" aria-label="Pausar" disabled>⏸️</button>
        <span id="status-badge" class="status-badge status-idle">Listo</span>
      </div>

      <audio id="audio-player" preload="none" playsinline crossorigin="anonymous"></audio>
      <div id="error-msg" role="alert" class="error-msg" hidden></div>
    </section>

    <section class="info-section">
      <h2>Programación</h2>
      <p>Pronto.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Radio Matías Batista. Proyecto independiente.</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
